app:
  name: clover-platform
  env: dev

database:
  enabled: true
  driver: postgresql
  version: 18
  url_env: DATABASE_URL
  schemas:
    - core
    - portal
    - contract_review
    - bid_generator
    - rag
    - competitor_analysis

storage:
  backend: local
  base_dir: ./data

runtime:
  ports_file: ./runtime/ports.json

security:
  auth_mode: legacy
  note: Authentication remains unchanged in this phase.
