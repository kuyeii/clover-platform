apps:
  portal:
    name: 统一入口
    code: portal
    module_key: portal
    description: 四叶草平台统一入口与模块导航。
    enabled: true
    legacy_path: legacy/portal-launchpad
    module_path: modules/portal
    route_path: /
    target_api_prefix: /api/v1/portal
    iframe_enabled: false
    iframe_url_env:
    permission_default: true
    legacy_health_check: /api/health
    storage_namespace: portal
    workflow_refs: []
    dev:
      enabled: true
      kind: portal
      working_dir: legacy/portal-launchpad
      frontend_working_dir: legacy/portal-launchpad
      backend_working_dir: legacy/portal-launchpad
      frontend_command: npx vite --host 0.0.0.0 --port {frontend_port}
      backend_command: "{python} -m uvicorn backend.main:app --host 0.0.0.0 --port {backend_port} --reload"
      frontend_preferred_port: 5200
      backend_preferred_port: 5210
      frontend_port_range: [5200, 5209]
      backend_port_range: [5210, 5219]
      env:
        PORTAL_API_PORT: "{backend_port}"
        PORTAL_FRONTEND_PORT: "{frontend_port}"

  bid_generator:
    name: 标书生成
    code: bid-generator
    module_key: bid_generator
    description: 标书生成与相关文档处理模块。
    enabled: true
    legacy_path: legacy/bid-generator
    module_path: modules/bid_generator
    route_path: /apps/bid-generator
    target_api_prefix: /api/v1/bid-generator
    iframe_enabled: true
    iframe_url_env: BID_GENERATOR_URL
    permission_default: true
    legacy_health_check: /health
    storage_namespace: bid_generator
    workflow_refs:
      - bid_generator
    dev:
      enabled: true
      kind: frontend_backend
      working_dir: legacy/bid-generator
      frontend_working_dir: legacy/bid-generator/frontend-web
      backend_working_dir: legacy/bid-generator/pipt-flask
      frontend_command: npx vite --host 0.0.0.0 --port {frontend_port}
      backend_command: "{python} -m uvicorn main_lite:app --host 0.0.0.0 --port {backend_port}"
      frontend_preferred_port: 18110
      frontend_port_range: [18110, 18114]
      backend_preferred_port: 18115
      backend_port_range: [18115, 18119]
      health_check: /health
      env:
        VITE_API_BASE_URL: "http://127.0.0.1:{backend_port}"
        VITE_API_URL: "http://127.0.0.1:{backend_port}/api"
        HOST: "0.0.0.0"
        PORT: "{backend_port}"
        PIPT_CORS_ORIGINS: "http://localhost:{frontend_port},http://127.0.0.1:{frontend_port}"

  contract_review:
    name: 合同审查
    code: contract-review
    module_key: contract_review
    description: 合同风险审查与文件处理模块。
    enabled: true
    legacy_path: legacy/contract_review
    module_path: modules/contract_review
    route_path: /apps/contract-review
    target_api_prefix: /api/v1/contract-review
    iframe_enabled: true
    iframe_url_env: CONTRACT_REVIEW_URL
    permission_default: true
    legacy_health_check: /api/health
    storage_namespace: contract_review
    workflow_refs:
      - contract_review
    dev:
      enabled: true
      kind: frontend_backend
      working_dir: legacy/contract_review
      frontend_working_dir: legacy/contract_review/frontend
      backend_working_dir: legacy/contract_review
      python_bin_env: CONTRACT_REVIEW_PYTHON_BIN
      prefer_local_python: true
      frontend_command: npx vite --host 0.0.0.0 --port {frontend_port}
      backend_command: "{python} -m uvicorn web_api:app --host 0.0.0.0 --port {backend_port}"
      frontend_preferred_port: 18120
      frontend_port_range: [18120, 18124]
      backend_preferred_port: 18125
      backend_port_range: [18125, 18129]
      health_check: /api/health
      env:
        VITE_API_BASE_URL: "http://127.0.0.1:{backend_port}"
        VITE_API_TARGET: "http://127.0.0.1:{backend_port}"

  rag_qa:
    name: RAG 问答
    code: rag-web-search
    module_key: rag_qa
    description: RAG 知识问答与 Web Search 模块。
    enabled: true
    legacy_path: legacy/chat_with_rag_and_websearch
    module_path: modules/rag_qa
    route_path: /apps/rag-web-search
    target_api_prefix: /api/v1/rag-web-search
    iframe_enabled: true
    iframe_url_env: RAG_QA_URL
    permission_default: true
    legacy_health_check: /api/v1/health
    storage_namespace: rag_qa
    workflow_refs:
      - rag_qa
    dev:
      enabled: true
      kind: frontend_backend
      working_dir: legacy/chat_with_rag_and_websearch
      frontend_working_dir: legacy/chat_with_rag_and_websearch/frontend
      backend_working_dir: legacy/chat_with_rag_and_websearch/backend
      python_bin_env: RAG_QA_PYTHON_BIN
      prefer_local_python: true
      frontend_command: npx vite --host 0.0.0.0 --port {frontend_port}
      backend_command: "{python} -m uvicorn app.main:app --host 0.0.0.0 --port {backend_port}"
      frontend_preferred_port: 18140
      frontend_port_range: [18140, 18144]
      backend_preferred_port: 18145
      backend_port_range: [18145, 18149]
      health_check: /api/v1/health
      env:
        VITE_API_BASE_URL: "http://127.0.0.1:{backend_port}"
        CORS_ORIGINS: "http://localhost:{frontend_port},http://127.0.0.1:{frontend_port}"

  competitor_analysis:
    name: 竞对分析
    code: competitor-analysis
    module_key: competitor_analysis
    description: 公司竞对分析与报告生成模块。
    enabled: true
    legacy_path: legacy/company-competitors-analysis
    module_path: modules/competitor_analysis
    route_path: /apps/competitor-analysis
    target_api_prefix: /api/v1/competitor-analysis
    iframe_enabled: true
    iframe_url_env: COMPETITOR_ANALYSIS_URL
    permission_default: true
    legacy_health_check: /api/health
    storage_namespace: competitor_analysis
    workflow_refs:
      - competitor_analysis
    dev:
      enabled: true
      kind: frontend_backend
      working_dir: legacy/company-competitors-analysis
      frontend_working_dir: legacy/company-competitors-analysis
      backend_working_dir: legacy/company-competitors-analysis
      frontend_command: npx vite --host 0.0.0.0 --port {frontend_port}
      backend_command: "{python} backend/server.py --host 0.0.0.0 --port {backend_port}"
      frontend_preferred_port: 18130
      frontend_port_range: [18130, 18134]
      backend_preferred_port: 18135
      backend_port_range: [18135, 18139]
      health_check: /api/health
      env:
        VITE_API_BASE_URL: "http://127.0.0.1:{backend_port}"
        VITE_API_TARGET: "http://127.0.0.1:{backend_port}"
        HISTORY_SERVER_PORT: "{backend_port}"
        BACKEND_PORT: "{backend_port}"
        CORS_ORIGIN: "http://localhost:{frontend_port}"
