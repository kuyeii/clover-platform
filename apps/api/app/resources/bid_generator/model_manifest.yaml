          temperature: BID_CONTENT_REWRITE_REVIEW_LLM_TEMPERATURE
          top_p: BID_CONTENT_REWRITE_REVIEW_LLM_TOP_P
          enable_thinking: BID_CONTENT_REWRITE_REVIEW_LLM_ENABLE_THINKING
        completion_params:
          enable_thinking: false
          temperature: 0.15
          top_p: 0.7
      rewrite_generate:
        type: llm
        dsl_node_id: llm_rewrite
        dsl_title: LLM REWRITE
        provider: langgenius/openai_api_compatible/openai_api_compatible
        default_model: Kimi-K2.5
        env_prefix: BID_CONTENT_REWRITE_GENERATE_LLM
        env_vars:
