          temperature: BID_DIAGRAM_PLANNER_LLM_TEMPERATURE
          top_p: BID_DIAGRAM_PLANNER_LLM_TOP_P
        completion_params:
          temperature: 0.08
          top_p: 0.7
      diagram_svg_render:
        type: llm
        dsl_node_id: llm_renderer
        dsl_title: LLM SVG 渲染
        provider: langgenius/openai_api_compatible/openai_api_compatible
