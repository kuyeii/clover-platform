          model: BID_CONTENT_GROUP_WITH_SEARCH_LLM_MODEL
          temperature: BID_CONTENT_GROUP_WITH_SEARCH_LLM_TEMPERATURE
          top_p: BID_CONTENT_GROUP_WITH_SEARCH_LLM_TOP_P
          enable_thinking: BID_CONTENT_GROUP_WITH_SEARCH_LLM_ENABLE_THINKING
        completion_params:
          enable_thinking: false
          temperature: 0.2
          top_p: 0.8
      group_content_without_search:
        type: llm
        dsl_node_id: llm_without_search
        dsl_title: LLM WITHOUT SEARXNG
        provider: langgenius/openai_api_compatible/openai_api_compatible
        default_model: Kimi-K2.5
        env_prefix: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM
        env_vars:
          base_url: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_BASE_URL
          api_key: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_API_KEY
          model: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_MODEL
          temperature: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_TEMPERATURE
          top_p: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_TOP_P
          enable_thinking: BID_CONTENT_GROUP_WITHOUT_SEARCH_LLM_ENABLE_THINKING
        completion_params:
          enable_thinking: false
          temperature: 0.2
          top_p: 0.8
      group_content_knowledge:
        type: knowledge_retrieval
        dsl_node_id: knowledge_node
        dsl_title: 知识检索
        dataset_id_env: BID_CONTENT_GROUP_DATASET_ID
        dataset_api_base_url_env: DIFY_API_BASE_URL
        dataset_api_key_env: DIFY_DATASET_API_KEY
        retrieval_mode: multiple
        top_k: 4
      placeholder_repair:
        type: llm
        dsl_node_id: placeholder_repair_llm
        dsl_title: 快速占位符修复
        provider: langgenius/openai_api_compatible/openai_api_compatible
        default_model: Kimi-K2.5
        env_prefix: BID_PLACEHOLDER_REPAIR_LLM
