    nodes:
      rewrite_review:
        type: llm
        dsl_node_id: llm_review
        dsl_title: LLM REVIEW
        provider: langgenius/openai_api_compatible/openai_api_compatible
        default_model: Kimi-K2.5
        env_prefix: BID_CONTENT_REWRITE_REVIEW_LLM
        env_vars:
          base_url: BID_CONTENT_REWRITE_REVIEW_LLM_BASE_URL
