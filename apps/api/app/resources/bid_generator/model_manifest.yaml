        env_prefix: BID_DIAGRAM_RENDERER_LLM
        env_vars:
          base_url: BID_DIAGRAM_RENDERER_LLM_BASE_URL
          api_key: BID_DIAGRAM_RENDERER_LLM_API_KEY
          model: BID_DIAGRAM_RENDERER_LLM_MODEL
          temperature: BID_DIAGRAM_RENDERER_LLM_TEMPERATURE
          top_p: BID_DIAGRAM_RENDERER_LLM_TOP_P
        completion_params:
