services:
  backend:
    build:
      context: ../..
      dockerfile: legacy/contract_review/Dockerfile
    env_file:
      - .env
      - ../../.env
    environment:
      PYTHONPATH: /app:/app/legacy/contract_review
      RUN_ROOT: /app/data/runs
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
