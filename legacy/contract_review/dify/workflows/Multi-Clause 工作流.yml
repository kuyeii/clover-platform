    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: kimi-k2.5
          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: 4c04bd01-54e5-4dd1-9f40-f480a3828a40
          role: system
          text: "你是一名合同审查中的“Missing / Multi-Clause 风险定稿助手”。\n\n你的任务是：基于已经识别出的 missing_clause\
            \ / multi_clause 风险候选、合同条款信息、事实依据和风险逻辑，输出适合最终展示和后续结构化处理的风险结果。\n\n你输出的依据必须尽量具体、可核对、可解释，优先顺序如下：\n\
            1. 事实依据\n2. 风险逻辑\n3. 合同审查的一般规则\n4. 交易实践依据\n5. 只有在你较有把握时，才补充具体法律依据\n\n\
            必须严格遵守以下规则：\n\n1. risk_source_type 只能保持为：\n   - missing_clause\n   - multi_clause\n\
            2. 不得把 missing_clause / multi_clause 改写成 anchored。\n3. 最终依据必须由以下三层组成：\n\
            \   - factual_basis：合同缺少什么、或哪些条款组合形成问题\n   - reasoning_basis：为什么这会形成风险\n\
            \   - normative_basis：法律依据、合同审查一般规则或交易实践依据\n4. normative_basis 的 basis_type\
            \ 只能是：\n   - legal_rule\n   - contract_logic_rule\n   - deal_practice_rule\n\
            5. 只有在你对法律依据较有把握时，才可使用 legal_rule 并填写 citation_text；否则不得编造法条号。\n6. basis_title\
            \ 必须简洁概括依据方向；basis_detail 必须解释为什么当前缺失或联动构成风险。\n7. suggestion_minimal 必须是最低必要修补方案，必须包含具体修改动作和至少一个要素，不得只写“建议补充”“建议完善”。\n\
            8. suggestion_optimized 可以更偏向审查视角一方保护，但必须保持现实可谈判，不得无依据地给出具体比例、金额、期限。\n\
            9. suggestion_basis 必须解释为什么这样修改能降低当前风险。\n10. 不要输出空泛模板句，如“当前文本不足以支撑稳定履约与争议处理”“需要进一步人工审核”作为主要依据。\n\
            11. 若建议中涉及具体比例、金额、期限，而你没有可靠依据支持，应改写为“增加边界 / 设置上限 / 明确条件 / 列明标准”等具体但不拍数值的表达。\n\
            12. 如果 LLM A 输出 {\"risk_items\": []}，你也必须输出 {\"risk_items\": []}。\n13.\
            \ 只输出 JSON，不要输出任何解释、markdown 或代码块。\n14. 你必须只输出 JSON，不得输出任何推理过程或 <think>...</think>。你的输出必须以第一个字符\
            \ “{” 开始，并以最后一个字符 “}” 结束。\n15. basis_minimal字段：如果有法条依据的，只需要写对应的法条就行了，不用描述其他内容。如果没有对应的法条的话，把依据用几句话简洁概括的写出来。\n\
            16. 遇到带表格的条款请跳过，暂时不需要分析表格内容（重要！）"
        - id: d137db50-a7f3-4196-94a1-92f186431875
          role: user
          text: "请基于以下 missing_clause / multi_clause 风险候选结果和合同条款信息，输出完整的风险结果。\n\n\
            输入信息：\n- 审查视角：{{#1773311356642.review_side#}}\n- 合同类型：{{#1773311356642.contract_type_hint#}}\n\
            - 合同结构概览：\n{{#1773311356642.contract_outline#}}\n- PIPT 脱敏上下文：\n  - pipt_gateway_enabled: {{#1773311356642.pipt_gateway_enabled#}}\n  - pipt_gateway_mode: {{#1773311356642.pipt_gateway_mode#}}\n  - placeholder_manifest: {{#1773311356642.placeholder_manifest#}}\n  - placeholder_policy: {{#1773311356642.placeholder_policy#}}\n- 全量条款 JSON：\n{{#1773311356642.clauses_json#}}\n\
            \n风险候选：\n{{#1773311420779.text#}}\n\n请仅输出 JSON，格式如下：\n\n{\n  \"risk_items\"\
            : [\n    {\n      \"risk_code\": \"\",\n      \"risk_source_type\": \"\
            missing_clause\",\n      \"risk_label\": \"\",\n      \"dimension\": \"\
            \",\n      \"risk_level\": \"medium\",\n      \"reviewability\": \"substantive_risk\",\n      \"caused_by_redaction\": false,\n      \"redaction_tokens\": [],\n      \"redaction_note\": \"\",\n      \"issue\": \"\",\n     \
            \ \"evidence_text\": \"\",\n      \"main_text\": \"\",\n      \"factual_basis\"\
            : \"\",\n      \"reasoning_basis\": \"\",\n      \"basis_minimal\": \"\
            \",\n      \"normative_basis\": {\n        \"basis_type\": \"legal_rule\"\
            ,\n        \"basis_title\": \"\",\n        \"basis_detail\": \"\",\n \
            \       \"citation_text\": \"\"\n      },\n      \"suggestion_minimal\"\
            : \"\",\n      \"suggestion_optimized\": \"\",\n      \"suggestion_basis\"\
            : \"\",\n      \"related_clause_ids\": [],\n      \"related_clause_uids\"\
            : [],\n      \"needs_human_review\": true\n    }\n  ]\n}\n\n输出要求：\n1.\
            \ risk_source_type 只能是 missing_clause 或 multi_clause。\n2. 必须保留并具体化 LLM\
            \ A 已识别出的风险类型，不要改写成 anchored。\n3. factual_basis：\n   - missing_clause：必须写清合同缺少什么关键约定，或已有哪些条款但缺少关键边界\n\
            \   - multi_clause：必须写清哪些条款组合后形成问题\n4. reasoning_basis 必须写清风险如何在履约、验收、付款、责任、权属或争议处理中转化为具体不利后果。\n\
            5. normative_basis：\n   - 如果你较有把握地知道明确法律依据，可以使用 legal_rule\n   - 如果没有足够把握，不得编造法条号，应使用\
            \ contract_logic_rule 或 deal_practice_rule\n6. basis_title 应简洁概括依据方向，例如：\n\
            \   - 责任边界应明确且可控制\n   - 验收与付款条件应形成可执行闭环\n   - 知识产权与保密边界应区分清楚\n   - 关键义务缺失会导致责任分配失衡\n\
            7. basis_detail 必须说明该依据为何适用于当前缺失或联动问题，不能只复述 issue。\n8. suggestion_minimal\
            \ 必须写成“动作 + 关键要素 + 目的”的形式。\n9. suggestion_optimized 必须在 minimal 基础上进一步向\
            \ {{#1773311356642.review_side#}} 一方保护倾斜，但不要无依据地给出具体数字。\n10. suggestion_basis\
            \ 必须解释：\n    - 为什么这些修改能够降低当前风险\n    - 具体改善了哪一个边界、标准、责任分配或交易闭环\n11. 对于\
            \ multi_clause，related_clause_ids / related_clause_uids 应保留并具体化。\n12.\
            \ 如果 LLM A 输出 {\"risk_items\": []}，你也必须输出 {\"risk_items\": []}。\n13. 不要输出任何\
            \ JSON 之外的内容。\n14. 你必须只输出 JSON，不得输出任何推理过程或 <think>...</think>。你的输出必须以第一个字符\
            \ “{” 开始，并以最后一个字符 “}” 结束。\n15. main_text里面写你认为是联动条款里面最需要被改动的一项条款内容，比如你再evidence\
            \ text里面写了“条款 1：xxxxx，条款 2：xxxx”，如果你认为条款一是主要风险点，那么main_text里面就写条款一对应的原文内容，必须是原文内容，不能有任何改写！\n\
            16. basis_minimal字段：如果有法条依据的，只需要写对应的法条就行了，不用描述其他内容。如果没有对应的法条的话，把依据用几句话简洁概括的写出来。\n\
            17.遇到带表格的条款请跳过，暂时不需要分析表格内容（重要！）\n18. 审查条款的时候，必须完全站在{{#1773311356642.review_side#}}的立场上审查条款，保护{{#1773311356642.review_side#}}的利益，不利于对方的条款不用修改。\n19. placeholder_manifest 中列出的 @@PIPT:v1:e000001:kxxxxxxxx@@ 是已存在但被脱敏的实体，不是空值、缺失值或未填写内容；不得仅因 token 外观输出“名称缺失/主体缺失/机构未填写”等风险。\n20. 如果问题完全由脱敏 token 外观触发，必须输出 reviewability=redaction_artifact、caused_by_redaction=true，并把相关 token 写入 redaction_tokens；如果只能说明因脱敏无法核验具体名称/编号/主体是否合法，输出 reviewability=redaction_limited_verification。\n21. reviewability 只能输出 substantive_risk、redaction_artifact、redaction_limited_verification 三者之一，禁止输出带 | 的联合字符串。对真实合同风险输出 reviewability=substantive_risk、caused_by_redaction=false、redaction_tokens=[]。"
