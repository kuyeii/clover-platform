id: "standard_bid_structure"
name: "通用标书结构"
description: "适用于绝大多数常规标书编排的通用划分结构。"

blocks:
  - id: "sec_overview"
    title: "一、 总体技术方案"
    instruction: |-
      请结合招标需求，撰写项目的总体部署架构设计、主流技术路线选型，并画龙点睛指出方案的先进性和合理性，无需展开具体的实施细节。
      【强制格式约束】：本章直接从正文或二级标题开始写，绝对禁止在回答开头重复输出本章的一级标题。
      【蓝图依从性约束】：如果《全局技术蓝图》要求提供架构图、拓扑图等图表，必须在此处包含相应的 Markdown 图片占位符及对应的详细描述。
    requires_search: false
    requires_blueprint: true

  - id: "sec_technical_response"
    title: "二、 核心技术响应"
    instruction: |-
      请按照招标文件中提出的各项[技术要求]，逐条给出对应的解决思路、技术指标以及具体实现方案，确保不遗漏重点得分项。
      【强制格式约束】：本章直接下笔，绝对禁止在开头重复输出本章的一级标题。
      【蓝图依从性约束】：深入检查《全局技术蓝图》。如果蓝图中有针对本章的“核心得分表格（如《响应偏离表》、《插件矩阵表》）”或“技术过渡方案”的强制要求，必须完整生成，绝不能遗漏。
    requires_search: true
    requires_blueprint: true

  - id: "sec_implementation"
    title: "三、 实施方案与项目计划"
    instruction: |-
      请撰写项目从启动到交付的实施流程图、里程碑节点（如：需求调研、开发测试、部署上线等）以及实施人员组织架构。要求具体且具有实操性。
      【强制格式约束】：本章直接下笔，绝对禁止在开头重复输出本章的一级标题。
      【蓝图依从性约束】：请注意，里程碑产出物中只能包含与实施阶段合理匹配的文档，不要混入与本章无关的其他“策略响应表格”或“独立专章方案”。人员配置也必须对齐蓝图中的特殊要求。
    requires_search: false
    requires_blueprint: true

  - id: "sec_quality"
    title: "四、 质量与安全保障培训"
    instruction: |-
      请撰写详细的项目验收标准、全面质量管理体系（QMS）、运行阶段的安全保障措施以及移交后的培训计划。
      【强制格式约束】：本章直接下笔，绝对禁止在开头重复输出本章的一级标题。请彻底清理任何未赋值的占位符（例如：<质保期月数>），用标准陈述替代。
      【蓝图依从性约束】：安全保障措施部分，请严格落实《全局技术蓝图》中要求的具体组件选型（如链路调用、加解密库、RBAC等），严禁泛泛而谈。
    requires_search: false
    requires_blueprint: true


