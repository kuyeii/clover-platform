    - data:
        code: |
          import ast
          import json
          import re

          def _strip_fence(text: str) -> str:
              out = str(text or "").strip()
              out = re.sub(r'<think>.*?</think>', '', out, flags=re.DOTALL).strip()
              out = re.sub(r'^\s*```(?:json|markdown)?\s*', '', out, flags=re.IGNORECASE)
              out = re.sub(r'\s*```\s*$', '', out, flags=re.IGNORECASE)
              return out.strip()

          def _parse_review(raw: str) -> dict:
              text = _strip_fence(raw)
              if not text:
                  return {}
              try:
                  return json.loads(text)
              except Exception:
                  try:
                      return ast.literal_eval(text)
                  except Exception:
                      return {"review_feedback": text}

          def main(review_text: str, rewritten_text: str) -> dict:
              review = _parse_review(review_text)
              feedback = str(review.get("review_feedback") or review.get("feedback") or "").strip()
              quality_score = review.get("quality_score")
              result = {
                  "text": _strip_fence(rewritten_text),
                  "feedback": feedback,
              }
              if quality_score is not None:
                  try:
                      result["quality_score"] = int(float(quality_score))
                  except Exception:
                      pass
              return result
        code_language: python3
