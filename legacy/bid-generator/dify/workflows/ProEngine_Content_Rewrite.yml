            任务：根据问题清单，为每个畸形占位符给出最小替换方案。
            允许格式只有：
            - {{__PIPT_类型_序号__}}
            - {{__BIDDER_KEY__}}

            规则：
            - 只处理问题清单中的 token。
            - 只能修复占位符格式，不得改写任何正文。
            - 能确定的修复为合法占位符；不能确定时不要给 replacement。
            - {{BIDDER_ORG}} 应修复为 {{__BIDDER_ORG__}}。
            - {{PIPT_name_1}} 应修复为 {{__PIPT_name_1__}}。
            - {{PIPT_1}} 缺少类型，无法可靠修复，必须跳过。

            输出格式：
            {"replacements":[{"from":"原 token","to":"合法占位符","reason":"简短原因"}]}
