          - placeholder_repair_report
          value_type: string
          variable: placeholder_repair_report
        selected: false
        title: 输出
        type: end
      height: 144
      id: end_node
      position:
        x: 1590
        y: 407
      positionAbsolute:
        x: 1590
        y: 407
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
