        y: 157
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json
          import re

          LEGAL_RE = re.compile(r"\{\{__(?:PIPT_[a-z_]+_\d+|BIDDER_[A-Z_]+)__\}\}")
          SUSPECT_RE = re.compile(r"\{\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}\}|(?<!\{)\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}(?!\})", re.IGNORECASE)

          def _load_json(raw, fallback):
              text = str(raw or "").strip()
              text = re.sub(r"^\s*```(?:json)?\s*", "", text, flags=re.IGNORECASE)
              text = re.sub(r"\s*```\s*$", "", text, flags=re.IGNORECASE)
              try:
                  return json.loads(text)
              except Exception:
                  match = re.search(r"(\{[\s\S]*\}|\[[\s\S]*\])", text)
                  if match:
                      try:
                          return json.loads(match.group(1))
                      except Exception:
                          return fallback
              return fallback

          def _find_issues(text):
              issues = []
              for match in SUSPECT_RE.finditer(str(text or "")):
                  token = match.group(0)
                  if not LEGAL_RE.fullmatch(token):
                      issues.append(token)
              return issues

          def main(text: str, repair_text: str, placeholder_issues: str) -> dict:
              issue_tokens = set(_load_json(placeholder_issues, []))
              repair_payload = _load_json(repair_text, {})
              replacements = repair_payload.get("replacements") if isinstance(repair_payload, dict) else []
              rewritten = str(text or "")
              applied = []

              for repl in replacements or []:
                  if not isinstance(repl, dict):
                      continue
                  src = str(repl.get("from") or "")
                  dst = str(repl.get("to") or "")
                  if not src or src not in issue_tokens or not LEGAL_RE.fullmatch(dst):
                      continue
                  if src in rewritten:
                      rewritten = rewritten.replace(src, dst)
                      applied.append({"from": src, "to": dst, "reason": str(repl.get("reason") or "")})

              remaining = _find_issues(rewritten)
              return {
                  "text": rewritten.strip(),
                  "placeholder_issues": json.dumps(remaining, ensure_ascii=False),
                  "placeholder_validation_failed": bool(remaining),
                  "placeholder_repair_report": json.dumps(applied, ensure_ascii=False),
              }
        code_language: python3
        outputs:
          text:
            children: null
            type: string
          placeholder_issues:
            children: null
            type: string
          placeholder_validation_failed:
            children: null
            type: boolean
          placeholder_repair_report:
            children: null
            type: string
        selected: false
        title: 应用占位符修复
        type: code
        variables:
        - value_selector:
          - placeholder_scan
          - text
          value_type: string
          variable: text
        - value_selector:
          - placeholder_repair_llm
          - text
          value_type: string
          variable: repair_text
        - value_selector:
          - placeholder_scan
          - placeholder_issues
          value_type: string
          variable: placeholder_issues
      height: 52
      id: apply_placeholder_repair
      position:
        x: 1892
        y: 157
      positionAbsolute:
        x: 1892
        y: 157
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
