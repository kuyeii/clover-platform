    - data:
        code: |
          import re

          def main(text: str) -> dict:
              output = str(text or "").strip()
              output = re.sub(r'<think>.*?</think>', '', output, flags=re.DOTALL).strip()
              output = re.sub(r'^\s*```(?:markdown|md)?\s*', '', output, flags=re.IGNORECASE)
              output = re.sub(r'\s*```\s*$', '', output, flags=re.IGNORECASE)
              output = re.sub(r'^\s*(?:[一二三四五六七八九十]+、|（[一二三四五六七八九十]+）|\([一二三四五六七八九十]+\)|\d+(?:\.\d+){1,3}|\d+\.)\s*', '', output, flags=re.MULTILINE)
              output = re.sub(r'\n{3,}', '\n\n', output).strip()
              return {"text": output}
        code_language: python3
        outputs:
          text:
            children: null
            type: string
        selected: false
        title: 输出清洗
        type: code
        variables:
        - value_selector:
          - llm_response
          - text
          value_type: string
          variable: text
      height: 52
      id: code_clean
      position:
        x: 684
        y: 282
      positionAbsolute:
        x: 684
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json
          import re

          LEGAL_RE = re.compile(r"\{\{__(?:PIPT_[a-z_]+_\d+|BIDDER_[A-Z_]+)__\}\}")
          SUSPECT_RE = re.compile(r"\{\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}\}|(?<!\{)\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}(?!\})", re.IGNORECASE)

          def _find_issues(text):
              issues = []
              for match in SUSPECT_RE.finditer(str(text or "")):
                  token = match.group(0)
                  if not LEGAL_RE.fullmatch(token) and token not in issues:
                      issues.append(token)
              return issues

          def main(text: str, placeholder_hint: str) -> dict:
              issues = _find_issues(text)
              allowed = []
              for token in LEGAL_RE.findall(str(placeholder_hint or "")):
                  if token not in allowed:
                      allowed.append(token)

              return {
                  "text": str(text or "").strip(),
                  "has_placeholder_issues": bool(issues),
                  "placeholder_issues": json.dumps(issues, ensure_ascii=False),
                  "allowed_placeholders_json": json.dumps(allowed, ensure_ascii=False),
                  "placeholder_validation_failed": bool(issues),
                  "placeholder_repair_report": "[]",
              }
        code_language: python3
        outputs:
          text:
            children: null
            type: string
          has_placeholder_issues:
            children: null
            type: boolean
          placeholder_issues:
            children: null
            type: string
          allowed_placeholders_json:
            children: null
            type: string
          placeholder_validation_failed:
            children: null
            type: boolean
          placeholder_repair_report:
            children: null
            type: string
        selected: false
        title: 占位符扫描
