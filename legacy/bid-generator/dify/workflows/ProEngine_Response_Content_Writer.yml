          - apply_placeholder_repair
          - text
          value_type: string
          variable: text
        - value_selector:
          - apply_placeholder_repair
          - placeholder_issues
          value_type: string
          variable: placeholder_issues
        - value_selector:
          - apply_placeholder_repair
          - placeholder_validation_failed
          value_type: boolean
          variable: placeholder_validation_failed
        - value_selector:
          - apply_placeholder_repair
          - placeholder_repair_report
          value_type: string
          variable: placeholder_repair_report
        selected: false
