    - data:
        code: |
          import ast
          import json
          import re

          def _strip_fence(text: str) -> str:
              out = str(text or "").strip()
              out = re.sub(r'<think>.*?</think>', '', out, flags=re.DOTALL).strip()
              out = re.sub(r'^\s*```(?:json)?\s*', '', out, flags=re.IGNORECASE)
              out = re.sub(r'\s*```\s*$', '', out, flags=re.IGNORECASE)
              return out.strip()

          def _extract_balanced_block(text: str, start_idx: int, left: str, right: str) -> str:
              if start_idx < 0 or start_idx >= len(text) or text[start_idx] != left:
                  return ""
              depth = 0
              in_string = False
              escaped = False
              for idx in range(start_idx, len(text)):
                  ch = text[idx]
                  if in_string:
                      if escaped:
                          escaped = False
                      elif ch == '\\':
                          escaped = True
                      elif ch == '"':
                          in_string = False
                      continue
                  if ch == '"':
                      in_string = True
                      continue
                  if ch == left:
                      depth += 1
                  elif ch == right:
                      depth -= 1
                      if depth == 0:
                          return text[start_idx:idx + 1]
              return ""

          def _find_named_array_block(text: str, field_name: str) -> str:
              match = re.search(r'"%s"\s*:\s*\[' % re.escape(field_name), text)
              if not match:
                  return ""
              start_idx = text.find("[", match.start())
              return _extract_balanced_block(text, start_idx, "[", "]")

          def _split_top_level_objects(array_block: str) -> list:
              blocks = []
              depth = 0
              start_idx = -1
              in_string = False
              escaped = False
              for idx, ch in enumerate(str(array_block or "")):
                  if in_string:
                      if escaped:
                          escaped = False
                      elif ch == '\\':
                          escaped = True
                      elif ch == '"':
                          in_string = False
                      continue
                  if ch == '"':
                      in_string = True
                      continue
                  if ch == '{':
                      if depth == 0:
                          start_idx = idx
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0 and start_idx >= 0:
                          blocks.append(array_block[start_idx:idx + 1])
                          start_idx = -1
              return blocks

          def _decode_jsonish_string(value: str) -> str:
              raw = str(value or "")
              if not raw:
                  return ""
              try:
                  return json.loads('"%s"' % raw.replace('"', '\\"'))
              except Exception:
                  pass
              text = raw.replace(r'\"', '"')
              text = text.replace(r'\n', '\n').replace(r'\r', '\r').replace(r'\t', '\t')
              return text.replace(r'\\', '\\')

          def _extract_json_like_string(text: str, field_name: str) -> str:
              match = re.search(r'"%s"\s*:\s*"' % re.escape(field_name), text)
              if not match:
                  return ""
              idx = match.end()
              chars = []
              escaped = False
              while idx < len(text):
                  ch = text[idx]
                  if escaped:
                      chars.append(ch)
                      escaped = False
                      idx += 1
                      continue
                  if ch == '\\':
                      chars.append(ch)
                      escaped = True
                      idx += 1
                      continue
                  if ch == '"':
                      tail = text[idx + 1:].lstrip()
                      if not tail or tail[0] in ",}]":
                          return _decode_jsonish_string("".join(chars)).strip()
                  chars.append(ch)
                  idx += 1
              return _decode_jsonish_string("".join(chars)).strip()

          def _extract_json_like_number(text: str, field_name: str):
              match = re.search(r'"%s"\s*:\s*(-?\d+(?:\.\d+)?)' % re.escape(field_name), text)
              return match.group(1).strip() if match else None

          def _recover_sections_payload(raw: str):
              text = _strip_fence(raw)
              if not text:
                  return {}, ""

              group_feedback = _extract_json_like_string(text, "group_feedback")
              array_block = _find_named_array_block(text, "sections") or _find_named_array_block(text, "items")
              if not array_block:
                  stripped = text.strip()
                  if stripped.startswith("["):
                      array_block = _extract_balanced_block(stripped, 0, "[", "]")
              if not array_block:
                  return {}, group_feedback

              rows = []
              for block in _split_top_level_objects(array_block):
                  item = {}
                  try:
                      item = json.loads(block)
                  except Exception:
                      try:
                          item = ast.literal_eval(block)
                      except Exception:
                          section_id = _extract_json_like_string(block, "section_id") or _extract_json_like_string(block, "id")
                          section_title = _extract_json_like_string(block, "section_title") or _extract_json_like_string(block, "title")
                          content = _extract_json_like_string(block, "content") or _extract_json_like_string(block, "text")
                          if not section_id or not content:
                              continue
                          item = {
                              "section_id": section_id,
                              "section_title": section_title,
                              "content": content,
                          }
                          quality_score = _extract_json_like_number(block, "quality_score")
                          if quality_score is not None:
                              item["quality_score"] = quality_score
                          feedback = _extract_json_like_string(block, "feedback")
                          if feedback:
                              item["feedback"] = feedback
                  if isinstance(item, dict):
                      rows.append(item)

              if rows:
                  return {"sections": rows, "group_feedback": group_feedback}, group_feedback
              return {}, group_feedback

          def _load_jsonish(text: str):
              raw = _strip_fence(text)
              if not raw:
                  return {}
              try:
                  return json.loads(raw)
              except Exception:
                  pass
              match = re.search(r'(\{[\s\S]*\}|\[[\s\S]*\])', raw)
              if match:
                  snippet = match.group(1)
                  try:
                      return json.loads(snippet)
                  except Exception:
                      try:
                          return ast.literal_eval(snippet)
                      except Exception:
                          pass
              try:
                  return ast.literal_eval(raw)
              except Exception:
                  payload, _ = _recover_sections_payload(raw)
                  return payload

          def _normalize_sections(obj):
              if isinstance(obj, dict):
                  rows = obj.get("sections") or obj.get("items") or []
                  group_feedback = str(obj.get("group_feedback") or "")
              elif isinstance(obj, list):
                  rows = obj
                  group_feedback = ""
              else:
                  rows = []
                  group_feedback = ""

              normalized = []
              if isinstance(rows, list):
                  for item in rows:
                      if not isinstance(item, dict):
                          continue
                      section_id = str(item.get("section_id") or item.get("id") or "").strip()
                      section_title = str(item.get("section_title") or item.get("title") or "").strip()
                      content = str(item.get("content") or item.get("text") or "").strip()
                      if not section_id or not content:
                          continue
                      row = {
                          "section_id": section_id,
                          "section_title": section_title,
                          "content": content,
                      }
                      if item.get("quality_score") is not None:
                          row["quality_score"] = item.get("quality_score")
                      if item.get("feedback") is not None:
                          row["feedback"] = str(item.get("feedback") or "")
                      normalized.append(row)
              return normalized, group_feedback

          def _pick_better_result(text_with_search: str, text_without_search: str):
              candidates = []
              for raw in (text_with_search, text_without_search):
                  parsed = _load_jsonish(raw)
                  sections, group_feedback = _normalize_sections(parsed)
                  candidates.append((sections, group_feedback))
              candidates.sort(key=lambda item: len(item[0]), reverse=True)
              return candidates[0]

          def main(text_with_search: str, text_without_search: str) -> dict:
              sections, group_feedback = _pick_better_result(text_with_search, text_without_search)
              return {
                  "sections": json.dumps(sections, ensure_ascii=False),
                  "group_feedback": group_feedback,
              }
