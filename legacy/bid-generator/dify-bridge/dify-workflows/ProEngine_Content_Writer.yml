          \ merged_draft)\n            for m in matches:\n                merged_draft\
          \ = merged_draft.replace('{{' + prefix + '_' + m + '}}', '{{__' + prefix\
          \ + '_' + m + '__}}')\n                placeholder_issues += 1\n\n     \
