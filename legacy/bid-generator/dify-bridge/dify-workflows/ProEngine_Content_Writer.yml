            \n【占位符引用铁律】\n- 文中的 @@PIPT:v1:e000001:kxxxxxxxx@@ 或 {{__PIPT_*__}} 格式占位符来自本地脱敏处理，必须逐字原样保留，绝不修改。\n- 如果上下文传入了投标人信息占位符（placeholder_hint），使用规则如下：\n\
            \  1. 仅在正文自然出现\"投标单位\"、\"法定代表人\"、\"项目负责人\"等主体时，才在对应位置引用占位符。\n  2. 禁止在段落结尾、文章总结或过渡段中主动插入这些占位符。\n\
