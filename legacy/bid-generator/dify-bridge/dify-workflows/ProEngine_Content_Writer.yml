    - data:
        code: |
          import json
          import re

          LEGAL_RE = re.compile(r"(?:\{\{__(?:PIPT_[a-z_]+_\d+|BIDDER_[A-Z_]+)__\}\}|@@PIPT:v1:e\d{6}:k[a-f0-9]{8}@@)")
          SUSPECT_RE = re.compile(r"\{\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}\}|(?<!\{)\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}(?!\})|@@[^@\s]*(?:PIPT|BIDDER)[^@\s]*@@?", re.IGNORECASE)

          def _load_json(raw, fallback):
              text = str(raw or "").strip()
              text = re.sub(r"^\s*```(?:json)?\s*", "", text, flags=re.IGNORECASE)
              text = re.sub(r"\s*```\s*$", "", text, flags=re.IGNORECASE)
              try:
                  return json.loads(text)
              except Exception:
                  match = re.search(r"(\{[\s\S]*\}|\[[\s\S]*\])", text)
                  if match:
                      try:
                          return json.loads(match.group(1))
                      except Exception:
                          return fallback
              return fallback

          def _find_issues(text, allowed):
              issues = []
              allowed_set = set(allowed)
              for match in SUSPECT_RE.finditer(str(text or "")):
                  token = match.group(0)
                  is_legal = bool(LEGAL_RE.fullmatch(token))
                  if not is_legal or (allowed_set and token not in allowed_set):
                      issues.append(token)
              return issues

          def main(text: str, diagram_specs: str, repair_text: str, placeholder_issues: str, allowed_placeholders_json: str) -> dict:
              issue_tokens = set(_load_json(placeholder_issues, []))
              allowed = [token for token in _load_json(allowed_placeholders_json, []) if isinstance(token, str) and LEGAL_RE.fullmatch(token)]
              allowed_set = set(allowed)
              repair_payload = _load_json(repair_text, {})
              replacements = repair_payload.get("replacements") if isinstance(repair_payload, dict) else []
              rewritten = str(text or "")
              applied = []

              for repl in replacements or []:
                  if not isinstance(repl, dict):
                      continue
                  src = str(repl.get("from") or "")
                  dst = str(repl.get("to") or "")
                  if not src or src not in issue_tokens or not LEGAL_RE.fullmatch(dst) or (allowed_set and dst not in allowed_set):
                      continue
                  if src in rewritten:
                      rewritten = rewritten.replace(src, dst)
                      applied.append({"from": src, "to": dst, "reason": str(repl.get("reason") or "")})

              remaining = _find_issues(rewritten, allowed)
              return {
                  "text": rewritten.strip(),
                  "diagram_specs": str(diagram_specs or "[]").strip() or "[]",
                  "placeholder_issues": json.dumps(remaining, ensure_ascii=False),
                  "placeholder_validation_failed": bool(remaining),
                  "placeholder_repair_report": json.dumps(applied, ensure_ascii=False),
              }
        code_language: python3
