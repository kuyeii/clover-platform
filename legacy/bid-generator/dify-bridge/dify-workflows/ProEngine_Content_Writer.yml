    - data:
        code: |
          import json
          import re

          LEGAL_RE = re.compile(r"(?:\{\{__(?:PIPT_[a-z_]+_\d+|BIDDER_[A-Z_]+)__\}\}|@@PIPT:v1:e\d{6}:k[a-f0-9]{8}@@)")
          SUSPECT_RE = re.compile(r"\{\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}\}|(?<!\{)\{[^{}]*(?:PIPT|BIDDER)[^{}]*\}(?!\})|@@[^@\s]*(?:PIPT|BIDDER)[^@\s]*@@?", re.IGNORECASE)

          def _find_allowed(placeholder_hint):
              allowed = []
              hint = str(placeholder_hint or "")
              marker = "PIPT_ALLOWED_PLACEHOLDERS_JSON:"
              if marker in hint:
                  raw_json = hint.split(marker, 1)[1].split("\n", 1)[0].strip()
                  try:
                      for token in json.loads(raw_json):
                          if isinstance(token, str) and LEGAL_RE.fullmatch(token) and token not in allowed:
                              allowed.append(token)
                  except Exception:
                      allowed = []
              if allowed:
                  return allowed
              for token in LEGAL_RE.findall(hint):
                  if token not in allowed:
                      allowed.append(token)
              return allowed

          def _find_issues(text, allowed):
              issues = []
              allowed_set = set(allowed)
              for match in SUSPECT_RE.finditer(str(text or "")):
                  token = match.group(0)
                  is_legal = bool(LEGAL_RE.fullmatch(token))
                  if (not is_legal or (allowed_set and token not in allowed_set)) and token not in issues:
                      issues.append(token)
              return issues

          def main(text: str, diagram_specs: str, placeholder_hint: str) -> dict:
              allowed = _find_allowed(placeholder_hint)
              issues = _find_issues(text, allowed)

              return {
                  "text": str(text or "").strip(),
                  "diagram_specs": str(diagram_specs or "[]").strip() or "[]",
                  "has_placeholder_issues": bool(issues),
                  "placeholder_issues": json.dumps(issues, ensure_ascii=False),
                  "allowed_placeholders_json": json.dumps(allowed, ensure_ascii=False),
                  "placeholder_validation_failed": bool(issues),
                  "placeholder_repair_report": "[]",
              }
