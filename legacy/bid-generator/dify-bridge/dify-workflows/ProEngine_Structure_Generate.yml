            \"营业执照\"、\"售后服务承诺函\"等独立的商务资质附件模块。\
            这些附件将由专门的商务体系单独生成。\n\n\
            在原有基础上进行润色，如果发现问题则自动修正后输出。\n\
            你必须严格遵守以下输出契约，否则视为失败：\n\
            1. 只能输出一个合法 JSON 对象，不允许任何解释文字、不允许 Markdown、不允许 ```json 代码块。\n\
            2. 顶层必须是 {\"outline\": [...]}。\n\
