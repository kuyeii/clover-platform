            必须改写成可直接用于正文的 H3，禁止“重点响应/补充说明/概述”。若存在“响应情况”，必须保持 children=[]，并补齐该 H2 自身的 writingHint、keywords、relatedAnalysisIds。\n\n\
            【重要防越界指令】：你现在审核的是技术方案大纲。\
