            缺失的必须补充对应章节或子章节。\n\n\
            3. 字数平衡：各章节字数应合理，权重高（评分分值高）的章节字数不能少于权重低的章节。\
            单章不得超过全文总字数的 35%，也不得低于 5%。\
            如果上游提供了预期总字数，各章节字数之和应接近该目标值。\n\n\
            4. 二级标题：每个一级章节必须有多个二级标题。一级与二级的 wordCount 各自独立，不做父子覆盖；前端会单独汇总展示。\n\n\
            5. writingHint 质量：每个一级标题必须有 writingHint，内容应与评分标准直接关联，\
            引导写作重点。writingHint 应具体引用评分项分值和解析报告中的技术要求。\n\n\
            6. keywords 质量：检查每个章节的 keywords 是否为技术实体词，去除宽泛词汇。\n\n\
