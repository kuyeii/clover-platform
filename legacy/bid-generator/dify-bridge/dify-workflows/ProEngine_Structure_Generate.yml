        code: |
          import json
          import re

          def _extract_seed_titles_from_requirements(requirements_text: str):
              text = str(requirements_text or "")
              if not text:
                  return []
              m = re.search(
                  r"【固定技术部分二级标题（强制）】\s*(.*?)(?:\n\n【|\Z)",
                  text,
                  flags=re.DOTALL,
              )
              block = m.group(1) if m else ""
              titles = []
              for line in block.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  mm = re.match(r"^\d+\.\s*(.+?)\s*$", line)
                  if mm:
                      titles.append(mm.group(1).strip())
              return titles

          def _extract_seed_titles_from_json(raw: str):
              try:
                  data = json.loads(str(raw or "").strip() or "[]")
              except Exception:
                  return []
              if isinstance(data, dict):
                  data = data.get("headings") or data.get("technical_sections") or data.get("outline") or data.get("sections") or []
              titles = []
              if isinstance(data, list):
                  for item in data:
                      if isinstance(item, dict):
                          title = str(item.get("title") or "").strip()
                      else:
                          title = str(item or "").strip()
                      if title:
                          titles.append(title)
              return titles

          def _normalize_title(value: str) -> str:
              return re.sub(r"\s+", "", str(value or "")).lower()

          def _ensure_list(value):
              return value if isinstance(value, list) else []

          def _clean_keywords(values, title: str):
              items = []
              for item in _ensure_list(values):
                  s = str(item or "").strip()
                  if s and s not in items:
                      items.append(s)
              if not items:
                  core = re.sub(r"^[一二三四五六七八九十0-9\.、\-\s]+", "", str(title or "")).strip()
                  if core:
                      items.append(core[:16])
              return items[:4]

          def _default_child_title(parent_title: str) -> str:
              core = re.sub(r"^[一二三四五六七八九十0-9\.、\-\s]+", "", str(parent_title or "")).strip()
              return f"{core}重点响应" if core else "重点响应"

          def main(structured_output: dict, requirements: str, structure_heading_seed_json: str, technical_h2_bindings_json: str) -> dict:
              data = structured_output if isinstance(structured_output, dict) else {}
              outline = data.get("outline") if isinstance(data.get("outline"), list) else []
              seed_titles = (
                  _extract_seed_titles_from_json(technical_h2_bindings_json)
                  or _extract_seed_titles_from_json(structure_heading_seed_json)
                  or _extract_seed_titles_from_requirements(requirements)
              )

              normalized_outline = []
              used_indexes = set()
              if seed_titles:
                  for idx, seed_title in enumerate(seed_titles):
                      seed_key = _normalize_title(seed_title)
                      raw = {}
                      raw_idx = None
                      for cand_idx, cand in enumerate(outline):
                          if cand_idx in used_indexes or not isinstance(cand, dict):
                              continue
                          if _normalize_title(cand.get("title", "")) == seed_key:
                              raw = cand
                              raw_idx = cand_idx
                              break
                      if raw_idx is None and idx < len(outline) and isinstance(outline[idx], dict):
                          raw = outline[idx]
                          raw_idx = idx
                      if raw_idx is not None:
                          used_indexes.add(raw_idx)

                      children_raw = _ensure_list(raw.get("children"))[:3]
                      children = []
                      for child_idx, child in enumerate(children_raw, start=1):
                          if not isinstance(child, dict):
                              continue
                          title = str(child.get("title") or "").strip()
                          if not title:
                              continue
                          children.append({
                              "id": str(child.get("id") or f"sec_{idx + 1}_{child_idx}"),
                              "title": title,
                              "headingLevel": 3,
                              "wordCount": int(child.get("wordCount") or 300),
                              "keywords": _clean_keywords(child.get("keywords"), title),
                              "writingHint": str(child.get("writingHint") or "").strip(),
                              "relatedAnalysisIds": _ensure_list(child.get("relatedAnalysisIds"))[:4],
                              "needDiagram": bool(child.get("needDiagram") or False),
                              "diagramBrief": str(child.get("diagramBrief") or "").strip(),
                              "diagramPlan": child.get("diagramPlan") if isinstance(child.get("diagramPlan"), dict) else {"enabled": False, "brief": "", "typeHint": "logic", "priority": 0},
                          })
                      normalized_outline.append({
                          "id": str(raw.get("id") or f"tech_heading_{idx + 1}"),
                          "title": seed_title,
                          "headingLevel": 2,
                          "wordCount": int(raw.get("wordCount") or max(1200, 400 * max(len(children), 1))),
                          "keywords": _clean_keywords(raw.get("keywords"), seed_title),
                          "writingHint": str(raw.get("writingHint") or "").strip(),
                          "relatedAnalysisIds": _ensure_list(raw.get("relatedAnalysisIds"))[:4],
                          "needDiagram": bool(raw.get("needDiagram") or False),
                          "diagramBrief": str(raw.get("diagramBrief") or "").strip(),
                          "diagramPlan": raw.get("diagramPlan") if isinstance(raw.get("diagramPlan"), dict) else {"enabled": False, "brief": "", "typeHint": "logic", "priority": 0},
                          "children": children,
                      })
              else:
                  normalized_outline = outline

              data["outline"] = normalized_outline

              tokens = []
              for sec in normalized_outline:
                  tokens.extend(_clean_keywords(sec.get("keywords"), sec.get("title", "")))
                  tokens.append(str(sec.get("title") or "").strip())
                  for child in _ensure_list(sec.get("children")):
                      tokens.extend(_clean_keywords(child.get("keywords"), child.get("title", "")))
                      tokens.append(str(child.get("title") or "").strip())

              compact = []
              for token in tokens:
                  s = str(token or "").strip()
                  if not s:
                      continue
                  if s not in compact:
                      compact.append(s)

              return {
                  "outline_json": json.dumps(data, ensure_ascii=False),
                  "keywords_for_search": " ".join(compact[:18]),
              }
