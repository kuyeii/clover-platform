services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/server/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PIPT_DB_PATH: /data/pipt_mappings.db
      PIPT_ENV: production
      PIPT_CORS_ORIGINS: ${PIPT_CORS_ORIGINS:-*}
    volumes:
      - ./.env:/app/.env:ro
      - ../../config.yaml:/app/config.yaml:ro
      - backend_db:/data
      - backend_data:/app/data
    expose:
      - "5000"

  frontend:
    build:
      context: ../..
      dockerfile: deploy/server/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  backend_db:
  backend_data:
