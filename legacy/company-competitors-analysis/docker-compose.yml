services:
  competitor-analysis:
    build: .
    container_name: competitor-analysis
    ports:
      - "8788:8788"
    env_file:
      - .env.local
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8788
      CORS_ORIGIN: http://localhost:8788
      STATIC_DIR: /app/dist
      # Stage 5-A uses PostgreSQL via DATABASE_URL or POSTGRES_*.
      # HISTORY_DB_PATH/history.sqlite3 is deprecated and must not be used as the current data source.
    restart: unless-stopped
