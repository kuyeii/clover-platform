        prompt_template:
        - id: c0c986a1-9017-44ce-b91d-67f2f4345ea3
          role: system
          text: '# 目标

            作为专业的分析顾问，总结你获取的目标分析企业与其竞争对手企业的多角度对比材料，形成一份整体分析报告


            ## 内容要求

            - 首先基于用户提供的材料，进行梳理并生成报告主体内容；

            - 之后再添加一节，作为重点提炼；

            - 在重点提炼之后，再添加一个章节，整体分析目标企业现状与相较竞争对手的优劣。


            ## 格式/规范等要求

            - 除基础常识外，仅基于用户输入信息进行回答，不要带入自身对企业的认识，同时严禁胡编乱造；

            - 分析报告需要完整覆盖用户提供材料的各个角度，但在内容上可以做精炼；

            - 输出的报告中不要显式出现类似“作为顾问”、“顾问角度意见”等表述，保持行文流畅；

            - 输出的报告各级标题要能够有效概括对应章节内容，不要使用类似“主体部分”等的标题，增强报告的专业性；

            - 进行具体分析时保持客观公正，但整体要从目标企业顾问的角度组织语言，避免过于尖锐的话语；'
        - edition_type: basic
          id: 6a418d11-e057-493a-9b61-0d305c50735c
          role: user
          text: '目标分析企业：{{#1774315293799.target_company_name#}}

            目标分析企业简介：{{#1774315293799.target_company_intro#}}

            竞争对手：{{#1774315293799.competitor#}}

