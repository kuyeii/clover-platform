    - data:
        agent_parameters:
          instruction:
            type: constant
            value: '任务目标

              基于用户提供的企业信息与当前日期，通过至多2次联网搜索（允许多query合并），收集并整理客观信息，归纳该企业的产品/服务特点。

              所有结论必须严格基于已获取的信息，不允许主观推测、常识补全或基于名称的语义推断。

              执行步骤

              ### 0、查询改写（必须执行）


              在进行搜索前，对用户输入进行标准化与扩展：


              - 将查询改写为**2–4个高质量搜索query**

              - **以中文query为主（优先适配国内企业与中文搜索环境）**

              - 如涉及技术术语、产品名称或国际业务，可补充1–2个英文query


              每个query应覆盖不同侧重点：

              - 企业名称 + 业务领域 + 产品/服务

              - 企业名称 + 功能/特点

              - 企业名称 + 商业模式（如适用）

              - 企业名称 + 用户评价（如适用）


              必须加入时间约束（如：2026（当前年份）、最新、近期、过去一年等）

              1、时间校准（必须执行）

              严格将用户输入日期作为当前日期，并在后续搜索中统一使用时间约束：

              优先检索“过去一年内”的信息

              若信息不足，可放宽至2–3年，但必须标注

              2、信息检索（仅一次调用，多query合并）

              使用联网搜索工具执行一次调用，但必须：

              同时提交步骤0生成的多个query（multi-query）

              优先来源（按可信度排序）：

              官方网站 / 官方文档

              权威媒体 / 行业报告

              知名技术社区 / 分析平台

              论坛 / 用户评论（低优先级，需标注）

              3、信息过滤与质量控制（必须执行）

              对结果进行筛选，仅保留同时满足“相关性 + 可信度”的信息：

              （1）时间过滤

              优先保留过去一年内容

              超过一年：仅在信息缺失时保留，并标注

              （2）来源质量过滤

              剔除低质量内容：

              内容农场 / SEO站

              无明确来源的转载

              同一信息多来源重复 → 合并

              （3）冲突处理

              若不同来源存在冲突：

              保留多个观点

              标注来源差异

              不进行主观裁决

              3.5、信息采纳严格性约束（必须执行）

              在决定是否采纳某条信息时，必须满足以下规则：

              （1）禁止基于名称或表面语义进行推断

              不允许仅根据名称（如“奖学金”“计划”“平台”等）推断其真实性质

              必须存在明确文本证据说明其实际用途或性质

              示例：

              ❌ 错误：看到“XX奖学金” → 推断为科研资助

              ✅ 正确：仅当原文明确说明“用于科研/教育资助”时才可采纳

              （2）必须具备“显式语义证据”

              仅当满足以下条件之一时，才可采纳：

              原文明确描述该产品/活动的功能、用途或目标

              原文直接说明其业务属性（如“用于…”，“提供…服务”）

              否则必须丢弃。

              （3）语义不明确一律丢弃（宁缺毋滥）

              以下情况必须丢弃：

              仅提及名称，无功能说明

              描述模糊（如“某活动/项目”但无具体内容）

              存在歧义或可能误解

              （4）禁止常识补全

              不允许使用常识推断或补全信息

              不允许将“常见含义”强加到具体案例

              （5）低置信度信息处理

              若信息部分可信但存在歧义：

              可保留原始描述

              必须标注：“原文未明确说明具体用途”

              不得用于归纳性结论

              4、信息整理（结构化压缩）

              对冗长内容进行压缩表达（不改变原意）

              每条信息保留：

              来源

              来源类型（官网/媒体/社区）

              时间（如可得）

              相同结论合并，避免重复

              5、分析与归纳（基于事实）

              围绕以下维度进行归纳：

              （1）产品/服务特点

              做什么

              核心功能

              解决的问题

              （2）商业模式/价值实现方式

              收费方式（订阅/一次性/广告等）

              客户类型（如 B2B / B2C）

              （3）质量与用户体验

              性能 / 稳定性

              用户评价 / 反馈

              分析阶段强约束

              每个结论必须有明确来源支撑

              优先使用过去一年信息

              禁止基于名称、直觉或行业常识进行推断

              若缺乏明确功能描述，不得纳入结论

              宁可减少结论数量，也必须保证真实性

              6、失败兜底机制（必须执行）

              情况A：近一年信息不足

              明确说明：“近一年公开信息有限”

              使用较早信息（标注时间）

              情况B：整体信息稀缺

              降低分析粒度，仅描述已知事实

              避免强行归纳

              7、自检（必须执行）

              逐条检查：

              是否每条结论都有来源支撑

              是否优先使用近一年信息

              是否存在未被证据支持的推断

              是否存在重复或冲突未说明

              是否存在“基于名称误判”的情况（如将“活动类奖学金”误判为科研资助）

              输出格式（严格遵守）

              （1）产品/服务特点：

              [结论1]（来源：xxx｜类型：官网/媒体/社区｜时间：xxxx）

              [结论2]（来源：xxx｜类型：xxx｜时间：xxxx）

              （2）商业模式/价值实现方式：

              [结论1]（来源：xxx｜类型：xxx｜时间：xxxx）

              或：无相关信息（原因：xxx）

              （3）质量与用户体验：

              [结论1]（来源：xxx｜类型：xxx｜时间：xxxx）

              或：无相关信息（原因：xxx）

              关键约束

              联网搜索工具最多调用1次（允许multi-query）

              必须执行“查询改写”

              搜索优先基于“过去一年”信息

              所有输出必须可追溯

              严禁编造、推测或使用未验证信息

              严禁基于名称或常识进行语义推断'
