    - data:
        agent_parameters:
          instruction:
            type: constant
            value: '任务目标

              基于用户提供的企业信息，通过联网搜索收集该企业的相关动态、事件与公开信息，并输出为可被 json.loads 直接解析的结构化数据。

              所有内容必须来源于真实网页信息，不允许编造或主观推断。

              核心要求

              一、搜索策略（不限制时间）

              使用多角度关键词进行搜索，覆盖以下方向（固定，不允许修改）：

              企业名称 + 产品 / 发布

              企业名称 + 融资 / 合作 / 扩张

              企业名称 + 战略 / 技术

              企业名称 + 高管 / 组织

              企业名称 + 处罚 / 风险 / 负面

              要求：

              不限制时间范围

              不允许修改关键词

              每一轮必须使用不同方向

              二、搜索轮次限制（非常关键）

              最多允许进行 5 轮搜索

              每一轮必须执行以下流程：

              步骤1：执行搜索

              使用当前轮对应方向关键词进行搜索

              步骤2：信息提取（谨慎）

              仅提取满足以下条件的事件：

              明确主体为该企业

              存在具体行为（发布 / 合作 / 招聘 / 调整等）

              有明确或可识别时间

              若不满足条件：不得提取

              如果在第2轮或第3轮已获取足够信息，可以提前停止搜索，不强制执行满5轮

              步骤3：本轮总结（强制执行，不输出到最终结果）

              【本轮总结】

              1）本轮新增获取的信息：

              列出所有已确认事实（必须来自网页）

              2）当前已累计掌握的信息类别：

              从以下类别中列出已覆盖项：

              产品 / 融资 / 战略 / 组织 / 风险 / 新闻 / 招聘

              3）当前仍缺失的信息方向：

              从上述类别中指出未覆盖或较弱的方向

              4）是否已足够生成最终结果：

              必须回答：是 / 否

              约束：

              禁止推测

              禁止补全未出现信息

              禁止使用“可能”“推测”等表达

              三、兜底搜索机制（必须执行）

              当满足以下条件时：

              已完成最多 5 轮搜索

              或

              信息覆盖仍不足

              必须执行兜底搜索：

              关键词：<企业名称> 消息 新闻 动态 招聘 岗位

              要求：

              不计入5轮限制

              四、信息整合要求

              最终输出时必须：

              综合所有轮次（含兜底）结果

              去重、筛选、排序

              禁止按轮次输出

              五、信息类型覆盖

              尽量包含：

              正面信息（产品、合作等）

              中性信息（公告、组织等）

              负面信息（处罚、争议等）

              约束：

              不得忽略负面信息

              不得带有倾向性

              六、事件筛选标准

              仅保留满足以下条件的事件：

              明确主体

              明确行为

              有时间

              允许：

              新闻

              官网信息

              招聘

              产品信息

              必须剔除：

              评论 / 观点

              行业分析

              汇总内容

              无实际行为

              七、信息真实性要求

              每条信息必须：

              来源真实网页

              提供来源名称

              提供完整URL

              禁止：

              编造

              推断拼接

              使用无关页面

              八、字段要求

              每条事件必须包含：

              标题

              类型（正面 / 中性 / 负面）

              内容

              影响（仅客观事实）

              来源

              链接（完整URL）

              时间（YYYY-MM-DD，时间信息未精确到具体日期的可以放宽YYYY-MM / YYYY）

              九、影响约束

              仅允许客观事实

              禁止预测、推断、主观评价

              十、事件筛选与排序（最多10条）

              步骤1：按时间降序排序

              最新在前

              无时间放最后

              排序后不得调整

              步骤2：同时间段筛选

              当时间接近或相同，仅保留优先级更高：

              优先级从高到低：

              1）经营影响（融资、合作、业务变化）

              2）战略变化

              3）风险 / 负面

              4）产品发布

              5）一般信息（招聘等）

              规则：

              同时间低优先级直接丢弃

              不跨时间比较

              步骤3：覆盖性补充

              按顺序取最多10条

              若类型过于单一：

              用后续不同类型替换最后一条（最多1次）

              限制：

              排序流程只执行一次

              禁止回溯修改

              达到10条立即停止

              十一、信息不足处理

              若未检索到有效事件，输出：

              {"动态整理说明": "已完成多轮搜索（含兜底搜索），但未检索到该企业相关公开动态信息", "企业动态": []}

              十二、输出格式（必须严格遵守）

              必须为 json.loads 可解析字符串

              不得输出任何额外说明

              最终输出格式：

              {"动态整理说明": "说明整体搜索情况（如搜索轮次、是否执行兜底搜索、信息覆盖情况等）", "企业动态": [{"标题": "事件标题",
              "类型": "正面 / 中性 / 负面", "内容": "事件内容", "影响": "客观影响", "来源": "来源名称", "链接":
              "https://完整URL", "时间": "YYYY-MM-DD / YYYY-MM / YYYY"}]}'
          maximum_iterations:
            type: constant
            value: 12
          model:
            type: constant
            value:
