    - data:
        agent_parameters:
          instruction:
            type: constant
            value: "## 目标\n基于用户提供的企业信息与竞争对手筛选条件，调用在线搜索工具（最多两次），分析并列举该企业的主要竞争对手（最多\
              \ 5 个）。\n\n## 执行步骤\n\n### 1. 首次检索与分析\n- **业务关键词提炼**：\n  基于用户提供的“目标企业介绍”和“主营业务”，提炼一个更宽泛但精准的业务领域关键词/短句。\n\
              \  - 必须完全来源于用户输入，不得使用模型外部知识\n  - 仅保留业务类型，去除修饰词\n\n- **执行搜索**：\n  使用该关键词\
              \ + “竞争对手搜索地域限制（省份）”进行搜索\n\n- **地域筛选（第一层：严格筛选）**：\n  仅保留满足以下条件的企业：\n\
              \  - 在该省份 **有法人注册信息 / 注册地明确位于该省**\n\n- **结果评估**：\n  - 若 ≥5 个 → 直接进入步骤\
              \ 3\n  - 若 <5 个 → 进入步骤 2（触发放宽策略）\n\n---\n\n### 2. 二次检索策略（仅在不足时触发）\n\n\
              #### 2.1 业务关键词扩展（可选）\n- 在原有关键词基础上适度扩展（仍需基于用户输入逻辑）\n\n#### 2.2 再次搜索\n\
              - 使用扩展关键词 + 省份限制再次搜索\n\n#### 2.3 地域筛选（第二层：放宽筛选）\n在本阶段，允许在“法人注册”之外，纳入以下企业：\n\
              \n- 在该省份 **有明确业务布局 / 分公司 / 直营网点 / 线下门店 / 重要运营活动**\n- 或搜索结果中明确表述其 **在该省份市场活跃\
              \ / 用户覆盖较多**\n\n⚠️ 注意：\n- 仍需有明确证据支持“在该省份活跃”，禁止推测\n- 不得纳入完全无该省份关联的企业\n\
              \n---\n\n### 3. 内容生成\n- 针对筛选出的每个竞争对手：\n  - 输出企业名称 + 简介\n  - 简介仅描述其业务与特点\n\
              \  - 禁止与目标企业对比\n\n- **竞争关系判定规则**：\n  - 不要求完全同业务\n  - 只要在同一“宽泛业务领域”存在用户或市场竞争即可\n\
              \n---\n\n### 4. 最终输出\n- 仅输出：\n  企业名称 + 企业简介\n- 最多 5 个\n- 若不足 5 个 → 输出实际数量，禁止补充或解释\n\
              \n---\n\n## 严格约束\n\n### 工具调用\n- 最多调用 2 次搜索工具\n- 第二次调用必须由“结果不足”触发\n\n\
              ### 地域筛选规则（核心约束）\n必须严格按照以下优先级执行：\n\n1️⃣ 第一优先级（必须优先尝试）  \n→ 法人注册在指定省份\n\
              \n2️⃣ 第二优先级（仅在不足时启用）  \n→ 在该省份有明确业务活动/运营存在\n\n3️⃣ 禁止行为  \n❌ 跳过第一层直接使用放宽条件\
              \  \n❌ 无证据推断“可能在该省有业务”  \n❌ 为凑满 5 个引入不符合地域条件的企业  \n\n---\n\n### 事实依据\n\
              - 所有信息必须来源于搜索结果\n- 禁止编造\n\n---\n\n### 输出格式\n- 仅包含：\n  企业名称 + 简介\n- 不得包含任何解释性文字"
          maximum_iterations:
